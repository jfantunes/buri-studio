# Netlify builds the static site from the repo: every route is prerendered
# into dist/, so no SPA redirect or functions are needed.
[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "22"
  SECRETS_SCAN_OMIT_KEYS = "GITHUB_BRANCH,GITHUB_REPO"

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

# Vite emits content-hashed files under /assets — safe to cache forever.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-store"
    X-Robots-Tag = "noindex, nofollow"
